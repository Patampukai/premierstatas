<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTMP Premier Stats</title>

<style>
:root {
  --bg: #0b1020;
  --panel: #121a30;
  --panel-2: #18213b;
  --text: #ffffff;
  --muted: #9aa3b2;
  --accent: #ff4655;
  --border: rgba(255,255,255,0.08);
  --shadow: 0 10px 30px rgba(0,0,0,0.35);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Trebuchet MS, sans-serif;
  background:
    radial-gradient(circle at top, rgba(255,70,85,0.14), transparent 35%),
    var(--bg);
  color: var(--text);
}

.wrap {
  max-width: 1800px;
  margin: 0 auto;
  padding: 28px;
}

h1 {
  margin: 0 0 8px;
  font-size: 34px;
  letter-spacing: 0.5px;
}

.note {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 22px;
  line-height: 1.5;
}

.row-scroll {
  padding-bottom: 8px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 16px;
}

.card {
  background:
    linear-gradient(180deg, rgba(24, 33, 59, 0.78), rgba(18, 26, 48, 0.9)),
    var(--bg-image, linear-gradient(180deg, var(--panel-2), var(--panel)));
  background-size: cover;
  background-position: center;
  border: 1px solid var(--border);
  padding: 12px;
  border-radius: 16px;
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  box-shadow: var(--shadow);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  min-height: 280px;

}

.card::before {
  content: "";
  position: absolute;
  inset: -12px;
  background: var(--bg-image);
  background-size: cover;
  background-position: center;
  filter: blur(10px);
  transform: scale(1.08);
  opacity: 0.55;
  z-index: 0;
  pointer-events: none;
}

.card::after {
  content: "Open Tracker ↗";
  position: absolute;
  right: 14px;
  top: 14px;
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  opacity: 0;
  transition: opacity 0.18s ease;
  z-index: 3;
}

.card > * {
  position: relative;
  z-index: 2;
}

.card:hover {
  transform: translateY(-4px);
  border-color: rgba(255,70,85,0.35);
}

.card:hover::after {
  opacity: 1;
}

.card:active {
  transform: translateY(-1px);
}

.top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.rank-icon {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  flex: 0 0 42px;
  display: grid;
  place-items: center;
  font-size: 20px;
  font-weight: 700;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
}

.name {
  font-size: 17px;
  font-weight: 700;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding-right: 72px;
}

.sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
}

.rank-line {
  margin: 8px 0 14px;
  color: #ffd7da;
  font-weight: 700;
  font-size: 14px;
  text-shadow: 0 1px 1px rgba(0,0,0,0.3);
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
  gap: 8px;
  
}

.stat {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  text-align: center;
  padding: 8px 6px;
  backdrop-filter: blur(3px);
}

.value {
  font-weight: 700;
  font-size: 12px;
  margin-bottom: 4px;
}

.label {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

.agents-box {
  margin-top: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 12px;
  backdrop-filter: blur(3px);
}

.agents-title {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.agents-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.nav-btn {
  text-decoration: none;
  background: linear-gradient(135deg, #ff4655, #ff2d55);
  color: white;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  box-shadow: 0 6px 16px rgba(255,70,85,0.35);
}

.nav-btn:hover {
  transform: translateY(-2px);
}
.rank-icon {
  width: 42px;
  height: 42px;
  border-radius: 64px;
  display: grid;
  place-items: center;
  overflow: hidden;
}

.rank-icon img {
  width: 70%;
  height: 80%;
  object-fit: contain;
}
.agent-item {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.08);
  padding: 5px 8px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.08);
}

.agent-item img {
  width: 22px;
  height: 22px;
  object-fit: contain;
}

.agent-item span {
  font-size: 12px;
}
.map-timeline {
  margin-bottom: 18px;
  padding: 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 14px;
  backdrop-filter: blur(4px);
}

/* maps row */
.maps {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  margin-bottom: 6px;
  text-align: center;
  font-weight: 700;
  font-size: 20px;
}

.maps a.done {
  margin-bottom: 18px;
  padding: 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 14px;
  backdrop-filter: blur(4px);
}

.maps a.current {
  margin-bottom: 18px;
  padding: 14px;
  background: linear-gradient(135deg, #ff4655, #ff2d55);
  color: white;
  border: 1px solid var(--border);
  border-radius: 14px;
  backdrop-filter: blur(4px);
}

.maps span {
  padding: 6px 8px;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
}

/* completed maps */
.maps .done {
  text-decoration: line-through;
  color: var(--muted);
  opacity: 0.7;
}
.maps .upcoming {
  text-decoration: line-through;
  color: var(--muted);
  opacity: 0.7;
}
.maps a.upcoming {
  margin-bottom: 18px;
  padding: 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 14px;
  backdrop-filter: blur(4px);
}
/* current map */
.maps .current {
  background: linear-gradient(135deg, #ff4655, #ff2d55);
  color: white;
}

/* dates row */
.dates {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  text-align: center;
  font-size: 13px;
  color: var(--muted);
}
.team-summary {
  margin-top: 18px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.team-stat {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 14px;
  text-align: center;
  backdrop-filter: blur(4px);
}

.team-value {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
  color: #ff6a7a;
}

.team-label {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.5px;
}
.agent-pill {
  font-size: 12px;
  padding: 6px 9px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.08);
}

@media (max-width: 1100px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 720px) {
  .grid {
    grid-template-columns: 1fr;
  }

  .stats {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>
<div class="wrap">
  <h1>✨PATAMPUKAI Stats✨
  <a href="act1stats.html" class="nav-btn">S26:ACT1 STATS</a>
  </h1>
  <div class="note">
    Season 26 Act 2 Premier
  </div>
 <div class="map-timeline">
    <div class="maps">

</div>
</div>

<script>
const MOCK = [
  {
    riotId: "OglukasM#RAWRR",
    rank: "Ascendant 1",
    kda: "140/121/41",
    hs: 27.9,
    plusMinus: "+19",
    kd: "1.16",
    adr: "160",
    fk: 20,
    fd: 20,
    mk: 14,
    ats: 551,

  },
  {

    rr: 100,
    kda: "120/104/32",
    hs: 29.1,
    plusMinus: "+16",
    kd: "1.15",
    adr: "134",
    fk: 19,
    fd: 9,
    mk: 7,
    ats: 603,
    agents: ["x4 Fade", "x2 Brimstone", "x2 Deadlock"]
  },
  {
    riotId: "0visman#PTMP",
    rank: "Platinum 3",
    rr: 100,
    kda: "113/113/21",
    hs: 22.75,
    plusMinus: "0",
    kd: "1",
    adr: "136",
    fk: 11,
    fd: 14,
    mk: 6,
    ats: 507,
    agents: ["x6 Killjoy", "x2 Sova"]
  },
  {
    riotId: "M O O C H I#whif",
    rank: "Gold 3",
    rr: 100,
    kda: "51/65/14",
    hs: 24.25,
    plusMinus: "-14",
    kd: "0.78",
    adr: "119.9",
    fk: 12,
    fd: 16,
    mk: 3,
    ats: 405,
    agents: ["x4 Jett"]
  },
  {
    riotId: "Knightly#Blawg",
    rank: "Diamond 1",
    rr: 100,
    kda: "69/79/26",
    hs: 36.3,
    plusMinus: "-10",
    kd: "0.87",
    adr: "126",
    fk: 10,
    fd: 13,
    mk: 5,
    ats: 500,
    agents: ["x2 Cypher", "x4 Waylay"]
  },
  {
    riotId: "xSugar#Ckrs",
    rank: "Silver 3",
    rr: 100,
    kda: "46/62/36",
    hs: 28.25,
    plusMinus: "-16",
    kd: "0.74",
    adr: "106",
    fk: 4,
    fd: 4,
    mk: 1,
    ats: 380,
    agents: ["x2 Skye", "x2 Raze"]
  }
];

const BACKGROUNDS = {
  "OglukasM": "omen.png",
  "Nedsonas": "fade.png",
  "Knightly": "waylay.png",
  "0visman": "killjoy.png",
  "xSugar": "skye.png",
  "M O O C H I": "jett.png",
};
const AGENT_ICONS = {
  "Astra": "agents/astra.png",
  "Brimstone": "agents/brimstone.png",
  "Breach": "agents/breach.png",
  "Chamber": "agents/chamber.png",
  "Clove": "agents/clove.png",
  "Cypher": "agents/cypher.png",
  "Deadlock": "agents/deadlock.png",
  "Fade": "agents/fade.png",
  "Gekko": "agents/gekko.png",
  "Harbor": "agents/harbor.png",
  "Iso": "agents/iso.png",
  "Jett": "agents/jett.png",
  "Kayo": "agents/kayo.png",
  "Killjoy": "agents/killjoy.png",
  "Miks": "agents/miks.png",
  "Neon": "agents/neon.png",
  "Omen": "agents/omen.png",
  "Phoenix": "agents/phoenix.png",
  "Raze": "agents/raze.png",
  "Reyna": "agents/reyna.png",
  "Sage": "agents/sage.png",
  "Skye": "agents/skye.png",
  "Sova": "agents/sova.png",
  "Tejo": "agents/tejo.png",
  "Veto": "agents/veto.png",
  "Viper": "agents/viper.png",
  "Vyse": "agents/vyse.png",
  "Waylay": "agents/waylay.png",
  "Yoru": "agents/yoru.png"
};

function rankMeta(rank) {
  const r = rank.toLowerCase();
  if (r.includes("radiant")) return { cls: "rank-radiant", icon: "ranks/radiant.png" };
  if (r.includes("immortal 1")) return { cls: "rank-immortal1", icon: "ranks/immortal1.png" };
  if (r.includes("immortal 2")) return { cls: "rank-immortal2", icon: "ranks/immortal2.png" };
  if (r.includes("immortal 3")) return { cls: "rank-immortal3", icon: "ranks/immortal2.png" };
  if (r.includes("ascendant 1")) return { cls: "rank-ascendant1", icon: "ranks/ascendant1.png" };
  if (r.includes("ascendant 2")) return { cls: "rank-ascendant2", icon: "ranks/ascendant2.png" };
  if (r.includes("ascendant 3")) return { cls: "rank-ascendant3", icon: "ranks/ascendant3.png" };
  if (r.includes("diamond 1")) return { cls: "rank-diamond1", icon: "ranks/diamond1.png" };
  if (r.includes("diamond 2")) return { cls: "rank-diamond2", icon: "ranks/diamond2.png" };
  if (r.includes("diamond 3")) return { cls: "rank-diamond3", icon: "ranks/diamond3.png" };
  if (r.includes("platinum 1")) return { cls: "rank-platinum1", icon: "ranks/plat1.png" };
  if (r.includes("platinum 2")) return { cls: "rank-platinum2", icon: "ranks/plat2.png" };
  if (r.includes("platinum 3")) return { cls: "rank-platinum3", icon: "ranks/plat3.png" };
  if (r.includes("gold 1")) return { cls: "rank-gold1", icon: "ranks/gold1.png" };
  if (r.includes("gold 2")) return { cls: "rank-gold2", icon: "ranks/gold2.png" };
  if (r.includes("gold 3")) return { cls: "rank-gold3", icon: "ranks/gold3.png" };
  if (r.includes("silver 1")) return { cls: "rank-silver1", icon: "ranks/silver1.png" };
  if (r.includes("silver 2")) return { cls: "rank-silver2", icon: "ranks/silver2.png" };
  if (r.includes("silver 3")) return { cls: "rank-silver3", icon: "ranks/silver3.png" };
  return { cls: "rank-bronze", icon: "bronze.png" };
}

function trackerUrl(riotId) {
  return "https://tracker.gg/valorant/profile/riot/" + encodeURIComponent(riotId) + "/overview";
}

const grid = document.getElementById("grid");

grid.innerHTML = MOCK.map(p => {
  const meta = rankMeta(p.rank);
  const href = trackerUrl(p.riotId);
  const nameOnly = p.riotId.split("#")[0];
  const bg = BACKGROUNDS[nameOnly];
  const styleAttr = bg ? `style="--bg-image: url('${bg}');"` : "";

  return `
    <div class="card" ${styleAttr} role="link" tabindex="0" onclick="window.open('${href}', '_blank', 'noopener,noreferrer')" onkeydown="if(event.key==='Enter' || event.key===' '){ event.preventDefault(); window.open('${href}', '_blank', 'noopener,noreferrer'); }">
      <div class="top">
        <div class="rank-icon ${meta.cls}">
  <img src="${meta.icon}" alt="" />
</div>
        <div>
          <div class="name" title="${p.riotId}">${p.riotId}</div>
          <div class="sub">Season 26 Act 2 Premier</div>
        </div>
      </div>

      <div class="rank-line">${p.rank}</div>

      <div class="stats">
        <div class="stat">
          <div class="value">${p.kda}</div>
          <div class="label">K/D/A</div>
        </div>

        <div class="stat">
          <div class="value">${p.plusMinus}</div>
          <div class="label">+/-</div>
        </div>

        <div class="stat">
          <div class="value">${p.kd}</div>
          <div class="label">K/D</div>
        </div>

        <div class="stat">
          <div class="value">${p.adr}</div>
          <div class="label">ADR</div>
        </div>

        <div class="stat">
          <div class="value">${p.hs}%</div>
          <div class="label">HS%</div>
        </div>
        <div class="stat">
          <div class="value">${p.ats}</div>
          <div class="label">ATS</div>
        </div>
        <div class="stat">
          <div class="value">${p.fk}</div>
          <div class="label">FK</div>
        </div>

        <div class="stat">
          <div class="value">${p.fd}</div>
          <div class="label">FD</div>
        </div>

        <div class="stat">
          <div class="value">${p.mk}</div>
          <div class="label">MK</div>
        </div>
      </div>

      <div class="agents-box">
        <div class="agents-title">AGENTS PLAYED</div>
        <div class="agents-list">
          ${p.agents.map(a => {
  const match = a.match(/x(\d+)\s(.+)/);
  const count = match ? match[1] : "";
  const name = match ? match[2] : a;
  const icon = AGENT_ICONS[name] || "";

  return `
    <div class="agent-item">
      <img src="${icon}" alt="${name}">
      <span>x${count}</span>
    </div>
  `;
}).join("")}
        </div>
      </div>
    </div>
  `;
}).join("");
</script>
</body>
