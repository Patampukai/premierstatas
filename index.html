<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTMP Premier Stats</title>

<style>
:root {
  --bg: #0b1020;
  --panel: #121a30;
  --panel-2: #18213b;
  --text: #ffffff;
  --muted: #9aa3b2;
  --accent: #ff4655;
  --border: rgba(255,255,255,0.08);
  --shadow: 0 10px 30px rgba(0,0,0,0.35);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Trebuchet MS, sans-serif;
  background:
    radial-gradient(circle at top, rgba(255,70,85,0.14), transparent 35%),
    var(--bg);
  color: var(--text);
}

.wrap {
  max-width: 1800px;
  margin: 0 auto;
  padding: 28px;
}

h1 {
  margin: 0 0 8px;
  font-size: 34px;
  letter-spacing: 0.5px;
}

.note {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 22px;
  line-height: 1.5;
}

.row-scroll {
  padding-bottom: 8px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 16px;
}

.grid .card {
  grid-column: span 3;
}

/* Center the 3 cards on the second row */
.grid .card:nth-child(5) {
  grid-column: 2 / span 3;
}

.grid .card:nth-child(6) {
  grid-column: 5 / span 3;
}

.grid .card:nth-child(7) {
  grid-column: 8 / span 3;
}

.card {
  background:
    linear-gradient(180deg, rgba(24, 33, 59, 0), rgba(18, 26, 48, 0.877)),
    var(--bg-image, linear-gradient(180deg, var(--panel-2), var(--panel)));
  background-size: cover;
  background-position: center;
  border: 1px solid var(--border);
  padding: 12px;
  border-radius: 16px;
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  box-shadow: var(--shadow);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  min-height: 280px;

}

.card::before {
  content: "";
  position: absolute;
  inset: -12px;
  background: var(--bg-image);
  background-size: cover;
  background-position: center;
  filter: blur(10px);
  transform: scale(1.08);
  opacity: 0.55;
  z-index: 0;
  pointer-events: none;
}

.card::after {
  position: absolute;
  right: 14px;
  top: 14px;
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  opacity: 0;
  transition: opacity 0.18s ease;
  z-index: 3;
}

.card > * {
  position: relative;
  z-index: 2;
}

.card:hover {
  transform: translateY(-4px);
  border-color: rgba(255,70,85,0.35);
  box-shadow:
    0 10px 30px rgba(165, 149, 149, 0.486),
    0 0 20px rgba(156, 25, 36, 0.486);
}

.card:hover::after {
  opacity: 1;
}

.card:active {
  transform: translateY(-1px);
}

.top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}
.left {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}
.rank-icon {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  flex: 0 0 42px;
  display: grid;
  place-items: center;
  font-size: 20px;
  font-weight: 700;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
}

.name {
  font-size: 17px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}



.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}

.stat {
  position: relative;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  text-align: center;
  padding: 8px 6px;
  backdrop-filter: blur(3px);
  min-height: 50px;

  transition: 
    transform 0.18s ease,
    box-shadow 0.18s ease,
    background 0.18s ease,
    border-color 0.18s ease;

  z-index: 1;
}

/* POP-OUT EFFECT */
.stat:hover {
  transform: translateY(-6px) scale(1.08);
  background: rgba(255,255,255,0.09);
  border-color: rgba(255,70,85,0.35);

  box-shadow:
    0 10px 25px rgba(0,0,0,0.45),
    0 0 12px rgba(255,70,85,0.25);

  z-index: 5;
}
.stats:hover .stat:not(:hover) {
  opacity: 0.6;
  transform: scale(0.98);
}
.value {
  font-weight: 700;
  font-size: 12px;
  margin-bottom: 4px;
}

.label {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.5px;
  color: rgb(255, 255, 255);
}

.agents-box {
  margin-top: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 12px;
  backdrop-filter: blur(3px);
  border-top: 1px solid rgba(255,255,255,0.06);
  padding-top: 10px;
}

.agents-title {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.agents-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-start;

}
.nav-btn {
  text-decoration: none;
  background: linear-gradient(135deg, #ff4655, #ff2d55);
  color: white;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  box-shadow: 0 6px 16px rgba(255,70,85,0.35);
}

.nav-btn:hover {
  transform: translateY(-2px);
}
.rank-icon {
  width: 42px;
  height: 42px;
  border-radius: 64px;
  display: grid;
  place-items: center;
  overflow: hidden;
}

.rank-icon img {
  width: 70%;
  height: 80%;
  object-fit: contain;
}
.agent-item {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.08);
  padding: 5px 8px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.08);
}

.agent-item img {
  width: 22px;
  height: 22px;
  object-fit: contain;
}

.agent-item span {
  font-size: 12px;
}
.map-tabs {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  padding: 14px;
  margin-bottom: 18px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 18px;
  backdrop-filter: blur(6px);
}

.map-tab {
  text-decoration: none;
  color: var(--text);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 12px 10px 10px;
  min-height: 74px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 6px;
  position: relative;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(10,14,28,0.72), rgba(10,14,28,0.82)),
    var(--map-bg);
  background-size: cover;
  background-position: center;
  border: 1px solid rgba(255,255,255,0.08);
  transition:
    transform 0.18s ease,
    border-color 0.18s ease,
    box-shadow 0.18s ease,
    opacity 0.18s ease;

}
.map-tab.haven    { --map-bg: url("maps/haven.png"); }
.map-tab.fracture { --map-bg: url("maps/fracture.png"); }
.map-tab.lotus    { --map-bg: url("maps/lotus.png"); }
.map-tab.split    { --map-bg: url("maps/split.png"); }
.map-tab.bind     { --map-bg: url("maps/bind.png"); }
.map-tab.breeze   { --map-bg: url("maps/breeze.png"); }

.map-tab:hover {
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.14);
}

.map-name {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 0.4px;
}

.map-date {
  font-size: 12px;
  color: var(--muted);
}

/* Completed */
.map-tab.done {
  opacity: 0.72;
}

.map-tab.done .map-name {
  text-decoration: line-through;
  color: #ffffff;
}

/* Current */
.map-tab.current {
  background:
    linear-gradient(135deg, rgba(255, 70, 86, 0.212), rgba(255, 45, 83, 0.164)),
    var(--map-bg);
  background-size: cover;
  background-position: center;
  box-shadow:
    0 8px 24px rgba(255, 70, 86, 0.562),
    0 0 14px rgba(255, 70, 86, 0.521);
}

.map-tab.current .map-name,
.map-tab.current .map-date {
  color: white;
  text-decoration: none;
}

/* Upcoming */
.map-tab.upcoming {
  background:
    linear-gradient(180deg, rgba(0, 0, 0, 0.644), rgba(0, 0, 0, 0.644)),
    var(--map-bg);
  background-size: cover;
  background-position: center;
  opacity: 0.7;
}

.map-tab.upcoming .map-name {
  color: #ffffff;
}

.map-tab.upcoming .map-date {
  color: #ffffff;
}
.map-tab.done .map-date {
  color: #ffffff;
}
.team-summary {
  margin-top: 18px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.team-stat {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 14px;
  text-align: center;
  backdrop-filter: blur(4px);
}

.team-value {
  font-size: 22px;
  font-weight: 700;

}
.agent-item {

  transition:

  cursor: default;
}

.agent-item:hover {
  transform: translateY(-3px) scale(1.04);
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,70,85,0.28);
  box-shadow:
    0 10px 24px rgba(0,0,0,0.34),
    0 0 10px rgba(255,70,85,0.18);
  z-index: 8;
}

.agent-popup {
  position: absolute;
  left: 50%;
  bottom: calc(100% + 10px);
  transform: translateX(-50%) translateY(6px) scale(0.98);
  min-width: 120px;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(14, 20, 36, 0.96);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 14px 30px rgba(0,0,0,0.42);
  backdrop-filter: blur(10px);
  opacity: 0;
  pointer-events: none;
  transition:
    opacity 0.18s ease,
    transform 0.18s ease;
  text-align: center;
  z-index: 20;
}

.agent-item:hover .agent-popup {
  opacity: 1;
  transform: translateX(-50%) translateY(0) scale(1);
}

.agent-popup::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 100%;
  transform: translateX(-50%);
  border-width: 7px;
  border-style: solid;
  border-color: rgba(14, 20, 36, 0.96) transparent transparent transparent;
}

.agent-popup-name {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 6px;
}

.agent-popup-count {
  font-size: 20px;
  font-weight: 200;
  color: #ff6a7a;
  line-height: 1;
}

.agent-popup-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-top: 4px;
}
.team-label {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.5px;
}
.agent-pill {

.title-row {

.header-summary {

.header-stat {

.header-value {

/* PLATINUM */

/* RADIANT (extra just in case 👀) */
.rank-radiant {

.rank-badge {
  font-size: 14px;
  font-weight: 600;
  padding: 5px 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  color: #ffd7da;
  white-space: nowrap;
  flex-shrink: 0;

@media (max-width: 1400px) {
  .grid {
    grid-template-columns: repeat(3, 1fr);
  }

  .grid .card,
  .grid .card:nth-child(5),
  .grid .card:nth-child(6),

}

@media (max-width: 1100px) {

    grid-template-columns: repeat(2, 1fr);

@media (max-width: 720px) {
  .grid {
    grid-template-columns: 1fr;
  }
@media (max-width: 1100px) {
  .map-tabs {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (max-width: 720px) {
  .map-tabs {
    grid-template-columns: repeat(2, 1fr);
  }
}
  .stats {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

    mk: 0,
    ats: 0,
    agents: [
    ]
  }
];

const BACKGROUNDS = {
  "OglukasM": "omen.png",
  "Nedsonas": "fade.png",
  "Knightly": "waylay.png",
  "0visman": "killjoy.png",
  "xSugar": "skye.png",
  "M O O C H I": "jett.png",
};
const AGENT_ICONS = {
  "Astra": "agents/astra.png",
  "Brimstone": "agents/brimstone.png",
  "Breach": "agents/breach.png",
  "Chamber": "agents/chamber.png",
  "Clove": "agents/clove.png",
  "Cypher": "agents/cypher.png",
  "Deadlock": "agents/deadlock.png",
  "Fade": "agents/fade.png",
  "Gekko": "agents/gekko.png",
  "Harbor": "agents/harbor.png",
  "Iso": "agents/iso.png",
  "Jett": "agents/jett.png",
  "Kayo": "agents/kayo.png",
  "Killjoy": "agents/killjoy.png",
  "Miks": "agents/miks.png",
  "Neon": "agents/neon.png",
  "Omen": "agents/omen.png",
  "Phoenix": "agents/phoenix.png",
  "Raze": "agents/raze.png",
  "Reyna": "agents/reyna.png",
  "Sage": "agents/sage.png",
  "Skye": "agents/skye.png",
  "Sova": "agents/sova.png",
  "Tejo": "agents/tejo.png",
  "Veto": "agents/veto.png",
  "Viper": "agents/viper.png",
  "Vyse": "agents/vyse.png",
  "Waylay": "agents/waylay.png",
  "Yoru": "agents/yoru.png"
};

function rankMeta(rank) {
  const r = rank.toLowerCase();
  if (r.includes("radiant")) return { cls: "rank-radiant", icon: "ranks/radiant.png" };
  if (r.includes("immortal 1")) return { cls: "rank-immortal1", icon: "ranks/immortal1.png" };
  if (r.includes("immortal 2")) return { cls: "rank-immortal2", icon: "ranks/immortal2.png" };
  if (r.includes("immortal 3")) return { cls: "rank-immortal3", icon: "ranks/immortal2.png" };
  if (r.includes("ascendant 1")) return { cls: "rank-ascendant1", icon: "ranks/ascendant1.png" };
  if (r.includes("ascendant 2")) return { cls: "rank-ascendant2", icon: "ranks/ascendant2.png" };
  if (r.includes("ascendant 3")) return { cls: "rank-ascendant3", icon: "ranks/ascendant3.png" };
  if (r.includes("diamond 1")) return { cls: "rank-diamond1", icon: "ranks/diamond1.png" };
  if (r.includes("diamond 2")) return { cls: "rank-diamond2", icon: "ranks/diamond2.png" };
  if (r.includes("diamond 3")) return { cls: "rank-diamond3", icon: "ranks/diamond3.png" };
  if (r.includes("platinum 1")) return { cls: "rank-platinum1", icon: "ranks/plat1.png" };
  if (r.includes("platinum 2")) return { cls: "rank-platinum2", icon: "ranks/plat2.png" };
  if (r.includes("platinum 3")) return { cls: "rank-platinum3", icon: "ranks/plat3.png" };
  if (r.includes("gold 1")) return { cls: "rank-gold1", icon: "ranks/gold1.png" };
  if (r.includes("gold 2")) return { cls: "rank-gold2", icon: "ranks/gold2.png" };
  if (r.includes("gold 3")) return { cls: "rank-gold3", icon: "ranks/gold3.png" };
  if (r.includes("silver 1")) return { cls: "rank-silver1", icon: "ranks/silver1.png" };
  if (r.includes("silver 2")) return { cls: "rank-silver2", icon: "ranks/silver2.png" };
  if (r.includes("silver 3")) return { cls: "rank-silver3", icon: "ranks/silver3.png" };
  return { cls: "rank-bronze", icon: "bronze.png" };
}

function trackerUrl(riotId) {
  return "https://tracker.gg/valorant/profile/riot/" + encodeURIComponent(riotId) + "/overview";
}

const grid = document.getElementById("grid");

grid.innerHTML = MOCK.map(p => {
  const meta = rankMeta(p.rank);
  const href = trackerUrl(p.riotId);
  const nameOnly = p.riotId.split("#")[0];
  const bg = BACKGROUNDS[nameOnly];
  const styleAttr = bg ? `style="--bg-image: url('${bg}');"` : "";

  return `
    <div class="card" ${styleAttr} role="link" tabindex="0" onclick="window.open('${href}', '_blank', 'noopener,noreferrer')" onkeydown="if(event.key==='Enter' || event.key===' '){ event.preventDefault(); window.open('${href}', '_blank', 'noopener,noreferrer'); }">
  <div class="top">
    <div class="left">
      <div class="rank-icon ${meta.cls}">
        <img src="${meta.icon}" alt="" />
      </div>
      <div class="name" title="${p.riotId}">${p.riotId}</div>
    </div>

    <div class="rank-badge ${meta.cls}">${p.rank}</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="value">${p.kda}</div>
      <div class="label">K/D/A</div>
    </div>

    <div class="stat">
      <div class="value">${p.kd}</div>
      <div class="label">K/D</div>
    </div>

    <div class="stat">
      <div class="value">${p.adr}</div>
      <div class="label">ADR</div>
    </div>

    <div class="stat">
      <div class="value">${p.hs}%</div>
      <div class="label">HS%</div>
    </div>

    <div class="stat">
      <div class="value">${p.ats}</div>
      <div class="label">ATS</div>
    </div>

    <div class="stat">
      <div class="value">${p.fk}</div>
      <div class="label">FK</div>
    </div>

    <div class="stat">
      <div class="value">${p.fd}</div>
      <div class="label">FD</div>
    </div>

    <div class="stat">
      <div class="value">${p.mk}</div>
      <div class="label">MK</div>
    </div>
  </div>

  <div class="agents-box">
    <div class="agents-title">AGENTS PLAYED</div>
    <div class="agents-list">
      ${p.agents.map(agent => {
        const icon = AGENT_ICONS[agent.name] || "";
        return `
          <div class="agent-item">
            <img src="${icon}" alt="${agent.name}">
            <span>x${agent.count}</span>

            <div class="agent-popup">
              <div class="agent-popup-name">${agent.name}
                <span class="agent-popup-count">x${agent.count}</span>
              </div>

              <div class="agent-popup-stats">
                <div class="agent-popup-stat">
                  <span>K/D</span>
                  <strong>${agent.kd}</strong>
                </div>
                <div class="agent-popup-stat">
                  <span>ADR</span>
                  <strong>${agent.adr}</strong>
                </div>
                <div class="agent-popup-stat">
                  <span>HS%</span>
                  <strong>${agent.hs}</strong>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join("")}
    </div>
  </div>
</div>
  `;
}).join("");
</script>
</body>
</html>
