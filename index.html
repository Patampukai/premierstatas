<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTMP Demo Stats</title>

<style>
:root {
  --bg: #0b1020;
  --panel: #121a30;
  --panel-2: #18213b;
  --text: #ffffff;
  --muted: #9aa3b2;
  --accent: #ff4655;
  --border: rgba(255,255,255,0.08);
  --shadow: 0 10px 30px rgba(0,0,0,0.35);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at top, rgba(255,70,85,0.14), transparent 35%),
    var(--bg);
  color: var(--text);
}

.wrap {
  max-width: 1800px;
  margin: 0 auto;
  padding: 28px;
}

h1 {
  margin: 0 0 8px;
  font-size: 34px;
  letter-spacing: 0.5px;
}

.note {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 22px;
  line-height: 1.5;
}

.row-scroll {
  padding-bottom: 8px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.card {
  background:
    linear-gradient(180deg, rgba(24, 33, 59, 0.78), rgba(18, 26, 48, 0.9)),
    var(--bg-image, linear-gradient(180deg, var(--panel-2), var(--panel)));
  background-size: cover;
  background-position: center;
  border: 1px solid var(--border);
  padding: 16px;
  border-radius: 16px;
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  box-shadow: var(--shadow);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  min-height: 340px;
}

.card::before {
  content: "";
  position: absolute;
  inset: -12px;
  background: var(--bg-image);
  background-size: cover;
  background-position: center;
  filter: blur(10px);
  transform: scale(1.08);
  opacity: 0.55;
  z-index: 0;
  pointer-events: none;
}

.card::after {
  content: "Open Tracker ↗";
  position: absolute;
  right: 14px;
  top: 14px;
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  opacity: 0;
  transition: opacity 0.18s ease;
  z-index: 3;
}

.card > * {
  position: relative;
  z-index: 2;
}

.card:hover {
  transform: translateY(-4px);
  border-color: rgba(255,70,85,0.35);
}

.card:hover::after {
  opacity: 1;
}

.card:active {
  transform: translateY(-1px);
}

.top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.rank-icon {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  flex: 0 0 42px;
  display: grid;
  place-items: center;
  font-size: 20px;
  font-weight: 700;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
}

.rank-radiant { background: linear-gradient(135deg, #ff6a7a, #ff2d55); }
.rank-immortal { background: linear-gradient(135deg, #ff4fd8, #8b3dff); }
.rank-ascendant { background: linear-gradient(135deg, #4ce2b4, #1e9f7a); }
.rank-diamond { background: linear-gradient(135deg, #89b4ff, #456dff); }
.rank-platinum { background: linear-gradient(135deg, #57d6ff, #2d8fd6); }
.rank-gold { background: linear-gradient(135deg, #ffd56b, #d89a23); }
.rank-silver { background: linear-gradient(135deg, #dde2ee, #9ca6b8); }
.rank-bronze { background: linear-gradient(135deg, #d39b74, #8b5637); }

.name {
  font-size: 17px;
  font-weight: 700;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding-right: 72px;
}

.sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
}

.rank-line {
  margin: 8px 0 14px;
  color: #ffd7da;
  font-weight: 700;
  font-size: 14px;
  text-shadow: 0 1px 1px rgba(0,0,0,0.3);
}

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 10px;
}

.stat {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  text-align: center;
  padding: 10px 8px;
  backdrop-filter: blur(3px);
}

.value {
  font-weight: 700;
  font-size: 16px;
  margin-bottom: 4px;
}

.label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

.agents-box {
  margin-top: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 12px;
  backdrop-filter: blur(3px);
}

.agents-title {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.agents-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.nav-btn {
  text-decoration: none;
  background: linear-gradient(135deg, #ff4655, #ff2d55);
  color: white;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  box-shadow: 0 6px 16px rgba(255,70,85,0.35);
}

.nav-btn:hover {
  transform: translateY(-2px);
}
.agent-pill {
  font-size: 12px;
  padding: 6px 9px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.08);
}

@media (max-width: 1100px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 720px) {
  .grid {
    grid-template-columns: 1fr;
  }

  .stats {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>
<div class="wrap">
  <h1>✨PATAMPUKAI Stats✨
  <a href="act1stats.html" class="nav-btn">S26:ACT1 STATS</a>
  </h1>
  <div class="note">
    Season 26 Act 2 Premier
  </div>

  <div class="row-scroll">
    <div id="grid" class="grid"></div>
  </div>
</div>

<script>
const MOCK = [
  {
    riotId: "OglukasM#RAWRR",
    rank: "Radiant",
    rr: 100,
    kda: "102/95/23",
    hs: 24.6,
    plusMinus: "+7",
    kd: "1.07",
    adr: "157.68",
    fk: 18,
    fd: 18,
    mk: 9,
    agents: ["x3 Omen", "x1 Astra", "x1 Neon", "x1 Raze"]
  },
  {
    riotId: "VoicelessV#daun",
    rank: "Radiant",
    rr: 100,
    kda: "85/81/26",
    hs: 30.6,
    plusMinus: "+4",
    kd: "1.04",
    adr: "130",
    fk: 10,
    fd: 6,
    mk: 6,
    agents: ["x4 Fade", "x2 Brimstone"]
  },
  {
    riotId: "0visman#PTMP",
    rank: "Radiant",
    rr: 100,
    kda: "76/84/15",
    hs: 22.6,
    plusMinus: "-8",
    kd: "0.90",
    adr: "124.8",
    fk: 5,
    fd: 9,
    mk: 4,
    agents: ["x6 Killjoy"]
  },
  {
    riotId: "M O O C H I#whif",
    rank: "Radiant",
    rr: 100,
    kda: "51/65/14",
    hs: 24.25,
    plusMinus: "-14",
    kd: "0.78",
    adr: "119.9",
    fk: 12,
    fd: 16,
    mk: 3,
    agents: ["x4 Jett"]
  },
  {
    riotId: "Knightly#Blawg",
    rank: "Radiant",
    rr: 100,
    kda: "39/50/15",
    hs: 35,
    plusMinus: "-11",
    kd: "0.78",
    adr: "120.2",
    fk: 6,
    fd: 9,
    mk: 5,
    agents: ["x2 Cypher", "x2 Waylay"]
  },
  {
    riotId: "xSugar#Ckrs",
    rank: "Radiant",
    rr: 100,
    kda: "23/36/27",
    hs: 40.5,
    plusMinus: "-13",
    kd: "0.63",
    adr: "97.9",
    fk: 1,
    fd: 1,
    mk: 1,
    agents: ["x2 Skye"]
  }
];

const BACKGROUNDS = {
  "OglukasM": "omen.png",
  "VoicelessV": "fade.png",
  "Knightly": "waylay.png",
  "0visman": "killjoy.png",
  "xSugar": "skye.png",
  "M O O C H I": "jett.png",
};

function rankMeta(rank) {
  const r = rank.toLowerCase();
  if (r.includes("radiant")) return { cls: "rank-radiant", icon: "✦" };
  if (r.includes("immortal")) return { cls: "rank-immortal", icon: "◆" };
  if (r.includes("ascendant")) return { cls: "rank-ascendant", icon: "⬢" };
  if (r.includes("diamond")) return { cls: "rank-diamond", icon: "◈" };
  if (r.includes("platinum")) return { cls: "rank-platinum", icon: "⬡" };
  if (r.includes("gold")) return { cls: "rank-gold", icon: "⬟" };
  if (r.includes("silver")) return { cls: "rank-silver", icon: "⬢" };
  return { cls: "rank-bronze", icon: "⬣" };
}

function trackerUrl(riotId) {
  return "https://tracker.gg/valorant/profile/riot/" + encodeURIComponent(riotId) + "/overview";
}

const grid = document.getElementById("grid");

grid.innerHTML = MOCK.map(p => {
  const meta = rankMeta(p.rank);
  const href = trackerUrl(p.riotId);
  const nameOnly = p.riotId.split("#")[0];
  const bg = BACKGROUNDS[nameOnly];
  const styleAttr = bg ? `style="--bg-image: url('${bg}');"` : "";

  return `
    <div class="card" ${styleAttr} role="link" tabindex="0" onclick="window.open('${href}', '_blank', 'noopener,noreferrer')" onkeydown="if(event.key==='Enter' || event.key===' '){ event.preventDefault(); window.open('${href}', '_blank', 'noopener,noreferrer'); }">
      <div class="top">
        <div class="rank-icon ${meta.cls}">${meta.icon}</div>
        <div>
          <div class="name" title="${p.riotId}">${p.riotId}</div>
          <div class="sub">Season 26 Act 2 Premier</div>
        </div>
      </div>

      <div class="rank-line">${p.rank} • ${p.rr} RR</div>

      <div class="stats">
        <div class="stat">
          <div class="value">${p.kda}</div>
          <div class="label">K/D/A</div>
        </div>

        <div class="stat">
          <div class="value">${p.plusMinus}</div>
          <div class="label">+/-</div>
        </div>

        <div class="stat">
          <div class="value">${p.kd}</div>
          <div class="label">K/D</div>
        </div>

        <div class="stat">
          <div class="value">${p.adr}</div>
          <div class="label">ADR</div>
        </div>

        <div class="stat">
          <div class="value">${p.hs}%</div>
          <div class="label">HS%</div>
        </div>

        <div class="stat">
          <div class="value">${p.fk}</div>
          <div class="label">FK</div>
        </div>

        <div class="stat">
          <div class="value">${p.fd}</div>
          <div class="label">FD</div>
        </div>

        <div class="stat">
          <div class="value">${p.mk}</div>
          <div class="label">MK</div>
        </div>
      </div>

      <div class="agents-box">
        <div class="agents-title">AGENTS PLAYED</div>
        <div class="agents-list">
          ${p.agents.map(agent => `<span class="agent-pill">${agent}</span>`).join("")}
        </div>
      </div>
    </div>
  `;
}).join("");
</script>
</body>
</html>
